---
# ── Cilium ─────────────────────────────────────────────────────────────────────
# Installs Cilium as the CNI and kube-proxy replacement using eBPF.
# Must run after kubeadm init since kubeadm was run with --skip-phases=addon/kube-proxy
# Nodes will not reach Ready state until Cilium is installed.

# Add the official Cilium Helm repository
- name: Add Cilium Helm repo
  kubernetes.core.helm_repository:
    name: cilium
    repo_url: https://helm.cilium.io/
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

# Install Cilium with kube-proxy replacement enabled
# k8sServiceHost/Port tells Cilium where the API server is so it can
# replace kube-proxy for service routing
- name: Install Cilium
  kubernetes.core.helm:
    name: cilium
    chart_ref: cilium/cilium
    chart_version: "{{ cilium_version }}"
    release_namespace: "{{ cilium_namespace }}"
    create_namespace: false
    wait: true
    timeout: "5m0s"
    values:
      # Replace kube-proxy entirely with Cilium eBPF
      kubeProxyReplacement: true

      # API server address for kube-proxy replacement
      k8sServiceHost: "{{ ansible_default_ipv4.address }}"
      k8sServicePort: "6443"

      # Hubble — Cilium's built-in observability layer
      # Gives you a real-time view of network flows between pods
      hubble:
        relay:
          enabled: true
        ui:
          enabled: true

      # Use Kubernetes IPAM — pod IPs allocated from pod_cidr
      ipam:
        mode: kubernetes

      # Single-node for now — increase when adding workers
      operator:
        replicas: 1
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

# Wait for all nodes to be Ready before proceeding
# Node will only go Ready once Cilium has configured its networking
- name: Wait for all nodes to be Ready
  ansible.builtin.command: >
    kubectl wait node --all
    --for=condition=Ready
    --timeout=120s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false